<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Randy Molina | Full Stack Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Randy Molina - Desarrollador Full Stack especializado en PHP, Laravel, Angular y tecnologías web modernas.">
  <meta name="author" content="Randy Molina">
  <meta name="keywords" content="Randy Molina, Full Stack Developer, PHP, Laravel, Angular, MySQL, Web Developer">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Randy Molina | Full Stack Developer">
  <meta property="og:description" content="Desarrollador Full Stack especializado en PHP, Laravel, Angular y tecnologías web modernas.">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Theme initialization script (prevents flash) -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const theme = savedTheme || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- SPA redirect for GitHub Pages -->
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
